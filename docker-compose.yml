# Local dev parity with `npm run dev`. One file, one command:
#   docker compose up --build
# Then:
#   Frontend      → http://localhost:3000
#   Backend API   → http://localhost:3001/api/products
#   Admin panel   → http://localhost:8000/admin (admin@vapebay.local / password)
#   Postgres      → localhost:5432 (postgres / 1 / vapeshop_db)
#
# The API and admin both point at the same `db` service so writes from
# NestJS show up in Filament immediately (and vice versa).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vapeshop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vapeshop_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend-api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "1"
      DB_NAME: vapeshop_db
      NODE_ENV: production
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    # CORS in main.ts already allows http://localhost:3000.

  web:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_BASE: http://localhost:3001
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:3001
    depends_on:
      - api
    ports:
      - "3000:3000"

  admin:
    build:
      context: ./backend-admin
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: vapeshop_db
      DB_USERNAME: postgres
      DB_PASSWORD: "1"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # First boot: run the seeder once. Restart policy "on-failure" avoids the
    # `artisan migrate --seed` blocking subsequent boots.
    command: >
      sh -c "php artisan migrate --force --seed || true
             && php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  pgdata:
